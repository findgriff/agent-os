    <!-- Leaflet from CDN — the crew tracking map uses window.L (no npm dep) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />

      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin="" defer></script>
    <!-- Boot splash — lives inside #root, so React wipes it on first render -->
    <style>
      html { background: #05080C; }
      .boot {
        position: fixed; inset: 0; display: flex; flex-direction: column;
        align-items: center; justify-content: center; gap: 18px;
        background: radial-gradient(ellipse 60% 45% at 50% 42%, #0B1826, #05080C 75%);
      }
      .boot svg { animation: bootPulse 1.8s ease-in-out infinite; }
      .boot-title {
        font-family: 'Space Grotesk', system-ui, sans-serif;
        font-size: 14px; font-weight: 700; letter-spacing: 0.35em;
        color: #E8EDF5; text-indent: 0.35em;
      }
      .boot-bar {
        position: relative; width: 140px; height: 2px; overflow: hidden;
        border-radius: 999px; background: rgba(255, 255, 255, 0.08);
      }
      .boot-bar::after {
        content: ''; position: absolute; top: 0; bottom: 0; left: -35%; width: 35%;
        border-radius: 999px;
        background: linear-gradient(90deg, transparent, #19C3E6, transparent);
        animation: bootSweep 1.1s ease-in-out infinite;
      }
      @keyframes bootPulse {
        0%, 100% { filter: drop-shadow(0 0 6px rgba(25, 195, 230, 0.35)); transform: scale(1); }
        50% { filter: drop-shadow(0 0 18px rgba(25, 195, 230, 0.7)); transform: scale(1.04); }
      }
      @keyframes bootSweep { to { left: 100%; } }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="boot">
        <svg width="56" height="56" viewBox="0 0 48 48" fill="none">
          <path d="M24 3 L42 13.5 V34.5 L24 45 L6 34.5 V13.5 Z" stroke="#19C3E6" stroke-width="2" fill="rgba(25,195,230,0.06)" />
          <circle cx="24" cy="24" r="6.5" fill="#19C3E6" />
          <circle cx="24" cy="24" r="11" stroke="#A78BFA" stroke-width="1" opacity="0.6" />
        </svg>
        <div class="boot-title">AGENT OS</div>
        <div class="boot-bar"></div>
      </div>
    </div>
    <script type="module" src="/main.tsx"></script>
  </body>
</html>
